# ===== catcafe.siyue01.top 完整配置 =====

# 1. HTTP 请求强制跳转到 HTTPS
server {
    listen 80;
    server_name catcafe.siyue01.top;
    return 301 https://$server_name$request_uri;
}

# 2. 主服务块（HTTPS）
server {
    listen 443 ssl http2;
    server_name catcafe.siyue01.top;

    # SSL 证书路径（1Panel 自动推送的路径）
    ssl_certificate /www/sites/catcafe.siyue01.top/ssl/fullchain.pem;
    ssl_certificate_key /www/sites/catcafe.siyue01.top/ssl/privkey.pem;

    # SSL 优化配置
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";

    # 网站根目录
    root /www/sites/catcafe.siyue01.top/index;
    index index.html;

    # ACME 验证路径（用于 Let's Encrypt 证书申请）
    location ^~ /.well-known/acme-challenge {
        allow all;
        root /usr/share/nginx/html;
    }

    # ===== AI 聊天接口代理（核心：nginx 注入 API Key） =====
    location /api/chat {
        proxy_pass https://api.deepseek.com/chat/completions;
        proxy_ssl_server_name on;
        proxy_set_header Host api.deepseek.com;
        proxy_set_header Content-Type application/json;
        proxy_set_header Authorization "Bearer sk-你的DeepSeek-API-Key";
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # Next.js 静态资源（长期缓存）
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 其他静态资源
    location ~* \.(ico|svg|png|jpg|jpeg|gif|webp|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA 路由处理
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # 错误页面
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
